name: Fetch CW Data

on:
  schedule:
    - cron: '30 16 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests

      - run: python fetch_cw_data.py --output data/cw_data.json

      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/cw_data.json
          git diff --staged --quiet || git commit -m "Update CW data"
          git push
